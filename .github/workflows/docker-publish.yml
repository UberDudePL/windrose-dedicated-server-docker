name: Build and Publish Docker Image

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  docker:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - channel: stable
            build_args: |
              WINE_FLAVOR=stable
              ENABLE_WINETRICKS=false
              INSTALL_DEBUG_TOOLS=false
              DEFAULT_WINEDEBUG=-all
            tag_suffix: ""
            aliases: latest,stable
          - channel: staging
            build_args: |
              WINE_FLAVOR=staging
              ENABLE_WINETRICKS=true
              WINETRICKS_PACKAGES=win10 vcrun2022
              INSTALL_DEBUG_TOOLS=false
              DEFAULT_WINEDEBUG=-all
            tag_suffix: -staging
            aliases: staging
          - channel: debug
            build_args: |
              WINE_FLAVOR=stable
              ENABLE_WINETRICKS=false
              INSTALL_DEBUG_TOOLS=true
              DEFAULT_WINEDEBUG=warn+timestamp
            tag_suffix: -debug
            aliases: debug

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute tags
        id: tags
        run: |
          repo_lc="${GITHUB_REPOSITORY,,}"
          ghcr_image="ghcr.io/${repo_lc}"
          dh_image="docker.io/${{ secrets.DOCKERHUB_USERNAME }}/${GITHUB_REPOSITORY##*/}"
          ref_name="${GITHUB_REF_NAME}"
          tags="${ghcr_image}:${ref_name}${{ matrix.tag_suffix }},${dh_image}:${ref_name}${{ matrix.tag_suffix }}"

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            IFS=',' read -ra aliases <<< "${{ matrix.aliases }}"
            for alias in "${aliases[@]}"; do
              if [[ -n "$alias" ]]; then
                tags="$tags,${ghcr_image}:${alias},${dh_image}:${alias}"
              fi
            done
          fi

          echo "tags=$tags" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          build-args: ${{ matrix.build_args }}
          tags: ${{ steps.tags.outputs.tags }}
