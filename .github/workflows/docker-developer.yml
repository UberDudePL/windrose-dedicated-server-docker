---
name: Build and Publish Developer Images

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: docker-developer-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  docker:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - channel: stable
            build_args: |
              WINE_FLAVOR=stable
              ENABLE_WINETRICKS=false
              INSTALL_DEBUG_TOOLS=false
              DEFAULT_WINEDEBUG=-all
            channel_tag: dev
          - channel: staging
            build_args: |
              WINE_FLAVOR=staging
              ENABLE_WINETRICKS=true
              WINETRICKS_PACKAGES=win10 vcrun2022
              INSTALL_DEBUG_TOOLS=false
              DEFAULT_WINEDEBUG=-all
            channel_tag: dev-staging
          - channel: debug
            build_args: |
              WINE_FLAVOR=stable
              ENABLE_WINETRICKS=false
              INSTALL_DEBUG_TOOLS=true
              DEFAULT_WINEDEBUG=warn+timestamp
            channel_tag: dev-debug

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute tags
        id: tags
        run: |
          repo_lc="${GITHUB_REPOSITORY,,}"
          ghcr_image="ghcr.io/${repo_lc}"
          dh_image="docker.io/${{ secrets.DOCKERHUB_USERNAME }}/${GITHUB_REPOSITORY##*/}"
          short_sha="${GITHUB_SHA::7}"
          channel="${{ matrix.channel_tag }}"
          echo "tags=${ghcr_image}:${channel},${ghcr_image}:${channel}-${short_sha},${dh_image}:${channel},${dh_image}:${channel}-${short_sha}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          build-args: ${{ matrix.build_args }}
          tags: ${{ steps.tags.outputs.tags }}